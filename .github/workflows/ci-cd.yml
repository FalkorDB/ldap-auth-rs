name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  REGISTRY: docker.io
  IMAGE_NAME: falkordb/ldap-auth-rs
  RUSTFLAGS: "-C debuginfo=0"
  CARGO_INCREMENTAL: 0

concurrency:
  group: ci-cd-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --no-deps -- -D warnings

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run unit tests (no integration tests)
        run: cargo test --lib --bins
        env:
          RUST_BACKTRACE: 1

  rust-integration-tests:
    name: Rust Integration Tests
    runs-on: ubuntu-latest
    needs: unit-test

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build server binary (for ldap3 tests)
        run: cargo build --bin ldap-auth-rs

      - name: Start ldap-auth-rs (for ldap3 tests)
        run: |
          set -euo pipefail
          ./target/debug/ldap-auth-rs &
          LDAP_AUTH_PID=$!
          echo "LDAP_AUTH_PID=$LDAP_AUTH_PID" >> $GITHUB_ENV

          echo "Waiting for API health endpoint..."
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time" >&2
          kill "$LDAP_AUTH_PID" || true
          exit 1
        env:
          # Server configuration
          API_PORT: 8080
          LDAP_PORT: 3389
          LDAP_BASE_DN: dc=example,dc=com
          API_BEARER_TOKEN: asdf
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          RUST_LOG: info

      - name: Run Rust integration tests (includes ldap3)
        run: cargo test --tests -- --test-threads=1
        env:
          TEST_REDIS_URL: redis://127.0.0.1:6379/15
          RUN_LDAP3_TESTS: 1
          TEST_API_BASE_URL: http://127.0.0.1:8080
          TEST_API_TOKEN: asdf
          TEST_LDAP_URL: ldap://127.0.0.1:3389
          RUST_BACKTRACE: 1

      - name: Stop ldap-auth-rs
        if: always()
        run: |
          if [ -n "${LDAP_AUTH_PID:-}" ]; then
            kill "$LDAP_AUTH_PID" || true
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, rust-integration-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-binaries
          path: |
            target/release/ldap-auth-rs
            target/release/ldap-auth-cli
          retention-days: 1

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, rust-integration-tests]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-binaries
          path: target/release/

      - name: Make binaries executable
        run: chmod +x target/release/ldap-auth-rs target/release/ldap-auth-cli

      - name: Start LDAP server for compliance tests
        run: |
          # Start LDAP auth server in background
          ./target/release/ldap-auth-rs &
          LDAP_PID=$!
          sleep 5

          # Keep server running for tests
          echo "LDAP_PID=$LDAP_PID" >> $GITHUB_ENV
        env:
          RUST_LOG: info
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          LDAP_PORT: 3389
          LDAP_BASE_DN: dc=example,dc=com
          API_BEARER_TOKEN: admin

      - name: Install LDAP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ldap-utils

      - name: Run LDAP compliance tests
        run: |
          chmod +x tests/ldap_compliance_test.sh
          ./tests/ldap_compliance_test.sh
        env:
          LDAP_HOST: localhost
          LDAP_PORT: 3389
          BASE_DN: dc=example,dc=com
          TEST_ORG: testorg
          TEST_USER: testuser
          TEST_PASSWORD: testpass123
          API_HOST: localhost:8080
          API_TOKEN: admin

      - name: Cleanup LDAP server
        if: always()
        run: |
          kill $LDAP_PID || true

      - name: Run CLI sanity tests
        run: |
          chmod +x tests/cli_sanity_test.sh
          ./tests/cli_sanity_test.sh
        env:
          CLI_CMD: ./target/release/ldap-auth-cli

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-audit
        run: cargo binstall --no-confirm cargo-audit

      - name: Run security audit
        run: cargo audit

      - name: Run vulnerability scan with Grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          path: .
          fail-build: false
          output-format: sarif
          output-file: "grype-results.sarif"

      - name: Upload Grype results to GitHub Security
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: always()
        with:
          sarif_file: "grype-results.sarif"

  build-amd64:
    name: Build Docker Image (amd64)
    runs-on: ubuntu-latest
    needs: [lint, unit-test, rust-integration-tests, integration-test, security]
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-amd64
            type=ref,event=pr,suffix=-amd64
            type=semver,pattern={{version}},suffix=-amd64
            type=semver,pattern={{major}}.{{minor}},suffix=-amd64
            type=sha,prefix={{branch}}-,suffix=-amd64,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest-amd64,enable={{is_default_branch}}

      - name: Build and push amd64 image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-amd64
          cache-to: type=gha,mode=max,scope=build-amd64
          platforms: linux/amd64

  build-arm64:
    name: Build Docker Image (arm64)
    runs-on: ubuntu-24.04-arm
    needs: [lint, unit-test, rust-integration-tests, integration-test, security]
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,suffix=-arm64
            type=ref,event=pr,suffix=-arm64
            type=semver,pattern={{version}},suffix=-arm64
            type=semver,pattern={{major}}.{{minor}},suffix=-arm64
            type=sha,prefix={{branch}}-,suffix=-arm64,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest-arm64,enable={{is_default_branch}}

      - name: Build and push arm64 image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-arm64
          cache-to: type=gha,mode=max,scope=build-arm64
          platforms: linux/arm64

  create-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-,enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Select canonical image tag
        id: canonical_tag
        run: |
          set -euo pipefail
          # On PR, use the local -amd64 tag we just built since we didn't push a manifest
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | grep "\-amd64" | head -n 1)"
          else
            TAG="$(printf '%s\n' "${{ steps.meta.outputs.tags }}" | sed '/^[[:space:]]*$/d' | head -n 1)"
          fi
          if [ -z "$TAG" ]; then
            echo "No tags were generated by docker/metadata-action" >&2
            exit 1
          fi
          echo "SCAN_IMAGE=$TAG" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push manifest
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ steps.meta.outputs.tags }}" | while IFS= read -r TAG; do
            if [ -n "$TAG" ]; then
              echo "Creating manifest for: $TAG"
              docker buildx imagetools create -t "$TAG" \
                "${TAG}-amd64" \
                "${TAG}-arm64"
              echo "✓ Created manifest: $TAG"
            fi
          done

      - name: Verify multi-arch manifest
        if: github.event_name != 'pull_request'
        run: |
          docker buildx imagetools inspect ${{ env.SCAN_IMAGE }}

      - name: Verify Docker image
        run: |
          # Only pull if it was pushed (i.e. not a PR)
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker pull ${{ env.SCAN_IMAGE }}
          fi
          echo "=== Image Details ==="
          docker images ${{ env.SCAN_IMAGE }} --format "Size: {{.Size}}"
          echo "=== Verify binaries exist ==="
          docker run --rm --entrypoint sh ${{ env.SCAN_IMAGE }} -c "test -x /app/ldap-auth-rs && echo 'Main binary exists'"
          docker run --rm --entrypoint sh ${{ env.SCAN_IMAGE }} -c "command -v ldap-auth-cli >/dev/null && echo 'CLI binary exists'"
          docker run --rm --entrypoint ldap-auth-cli ${{ env.SCAN_IMAGE }} --help | head -3
          echo "=== Verify Alpine base ==="
          docker run --rm --entrypoint sh ${{ env.SCAN_IMAGE }} -c "cat /etc/os-release | grep 'Alpine Linux'"

      - name: Run CLI sanity tests in Docker
        run: |
          chmod +x tests/cli_sanity_test.sh
          CLI_CMD="docker run --rm --network host --entrypoint ldap-auth-cli ${{ env.SCAN_IMAGE }}" ./tests/cli_sanity_test.sh

      - name: Scan Docker image with Grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: ${{ env.SCAN_IMAGE }}
          fail-build: false
          output-file: "grype-image-results.sarif"
          severity-cutoff: high
          output-format: sarif

      - name: Scan Docker image with Grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: ${{ env.SCAN_IMAGE }}
          fail-build: true
          severity-cutoff: high

      - name: Upload Docker image scan results
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4
        if: always()
        with:
          sarif_file: "grype-image-results.sarif"

  deploy:
    name: Deploy Notification
    runs-on: ubuntu-latest
    needs: [create-manifest]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deployment notification
        run: |
          echo "Docker image pushed successfully!"
          echo "Image: ${{ env.IMAGE_NAME }}:latest"
          echo "Pull with: docker pull ${{ env.IMAGE_NAME }}:latest"
