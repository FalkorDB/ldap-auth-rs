name: Spellcheck

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  spellcheck:
    name: Spellcheck
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check spelling
        uses: crate-ci/typos@631208b7aac2daa8b707f55e7331f9112b0e062d
        with:
          files: |
            ./src
            ./tests
            ./docs
            ./README.md
            ./CONTRIBUTING.md
          config: ./.typos.toml
