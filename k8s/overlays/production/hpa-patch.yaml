apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ldap-auth-hpa
  labels:
    app.kubernetes.io/part-of: ldap-auth
spec:
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
