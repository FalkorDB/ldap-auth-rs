apiVersion: v1
kind: Service
metadata:
  name: redis-replica-service
  labels:
    app.kubernetes.io/part-of: ldap-auth
    app.kubernetes.io/component: cache
    app.kubernetes.io/name: redis-replica
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: cache
    app.kubernetes.io/name: redis-replica
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: redis-replica-headless
  labels:
    app.kubernetes.io/part-of: ldap-auth
    app.kubernetes.io/component: cache
    app.kubernetes.io/name: redis-replica
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/component: cache
    app.kubernetes.io/name: redis-replica
  ports:
  - name: redis
    port: 6379
    targetPort: redis
    protocol: TCP
